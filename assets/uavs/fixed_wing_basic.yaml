version: 1
kind: uav
name: fixed_wing_basic
description: Basic fixed-wing trainer (rc_cessna-class) for SLAM / mission research.
chassis:
  ref: fixed_wing_basic
sensors:
  - { name: imu,  ref: imu_default,       mount: base_link }
  - { name: gps,  ref: gps_default,       mount: base_link }
  - { name: baro, ref: barometer_default, mount: base_link }
  - name: nose_cam
    ref: mono_camera
    mount: nose_payload
    pose: [0, 0, 0, 0, 0, 0]
px4:
  airframe_id: 4041
  spawn_pose_m: [0.0, 0.0, 0.5, 0, 0, 0]
  hover_thrust: 0.40
