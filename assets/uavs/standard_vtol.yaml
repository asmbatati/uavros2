version: 1
kind: uav
name: standard_vtol
description: Standard VTOL with embedded sensors (PX4 stock model).
chassis:
  ref: standard_vtol
sensors:
  - { name: imu,  ref: imu_default,       mount: base_link }
  - { name: gps,  ref: gps_default,       mount: base_link }
  - { name: baro, ref: barometer_default, mount: base_link }
  - name: nose_cam
    ref: mono_camera
    mount: nose_payload
    pose: [0, 0, 0, 0, 0.17453293, 0]
px4:
  airframe_id: 4040
  spawn_pose_m: [0.0, 0.0, 0.5, 0, 0, 0]
  hover_thrust: 0.65
