version: 1
kind: sensor
name: velodyne_16
description: Velodyne VLP-16 3D LiDAR (16 vertical channels).
parameters:
  samples_vertical: 16
  samples_horizontal: 1875
  range_min_m: 0.4
  range_max_m: 100.0
  vfov_deg: 30           # ±15°
  hfov_deg: 360
  update_rate_hz: 10
gazebo:
  gz_model: velodyne_16
  body_link: lidar3d_link
ros:
  topic_template: "/{ns}/{sensor_name}/points"
  msg_type: sensor_msgs/PointCloud2
  default_rate_hz: 10
