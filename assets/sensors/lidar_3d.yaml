version: 1
kind: sensor
name: lidar_3d
description: Generic 3D LiDAR (uses Gazebo's gpu_lidar primitive).
parameters:
  samples_vertical: 16
  samples_horizontal: 1800
  range_min_m: 0.3
  range_max_m: 80.0
  vfov_deg: 30
  hfov_deg: 360
  update_rate_hz: 10
gazebo:
  gz_model: lidar_3d
  body_link: lidar3d_link
ros:
  topic_template: "/{ns}/{sensor_name}/points"
  msg_type: sensor_msgs/PointCloud2
  default_rate_hz: 10
