# Declares which worlds exist per simulator. The launch dispatcher reads
# this to fail fast on unsupported (simulator, world) combinations.
#
# Urban worlds 1-5 are heightmap-based outdoor terrains; their referenced
# DEM model dirs (models/urban<N>_terrain/) hold the heightmap binaries
# and are git-lfs tracked.

worlds:
  empty:
    gazebo: true        # PX4 default empty world
    webots: true
    mujoco: true
    isaac: false
    pybullet: true
    genesis: false
  warehouse:
    gazebo: warehouse.sdf
    webots: false
    mujoco: false
    isaac: false
    pybullet: false
    genesis: false
    note: "Indoor warehouse (formerly tugbot_depot)."
  urban1:
    gazebo: urban1.sdf
    note: "Original DEM testbed (formerly dem_world; needs models/urban1_terrain)."
  urban2:
    gazebo: urban2.sdf
    note: "Urban heightmap 2 (formerly taif_world; needs models/urban2_terrain LFS)."
  urban3:
    gazebo: urban3.sdf
    note: "Urban heightmap 3 (formerly taif1_world; needs models/urban3_terrain LFS, ~120 MB)."
  urban4:
    gazebo: urban4.sdf
    note: "Urban heightmap 4 (formerly taif_test; needs models/urban4_terrain LFS)."
  urban5:
    gazebo: urban5.sdf
    note: "Urban heightmap 5 (formerly taif_test4; needs models/urban5_terrain LFS)."
